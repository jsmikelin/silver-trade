services:
  - type: web
    name: silver-trade
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    healthCheckPath: /
    envVars:
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,helinsilver.com,localhost
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com,https://helinsilver.com,http://localhost:8000
      - key: PYTHON_VERSION
        value: 3.11.0
databases:
  - name: silver-db
    region: ohio
    plan: free
    ipAllowList: []
